name: frontend-ci

on:
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main, "integration/**", "frontend/**"]
    paths:
      - "ios/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Validate positioning copy
        run: ios/scripts/lint-positioning-copy.sh

      - name: Lint Swift
        run: >-
          swiftlint lint --strict --config ios/.swiftlint.yml
          ios/CrediWise ios/CrediWiseTests ios/CrediWiseUITests

      - name: Select available iPhone simulator
        run: |
          simulator_id="$(
            xcrun simctl list devices available |
              awk -F '[()]' '/iPhone/ { print $2; exit }'
          )"
          if [[ ! "$simulator_id" =~ ^[0-9A-Fa-f-]{36}$ ]]; then
            xcrun simctl list devices available
            echo "::error title=iOS simulator::No available iPhone simulator found"
            exit 1
          fi
          echo "IOS_SIMULATOR_DESTINATION=platform=iOS Simulator,id=$simulator_id" >> "$GITHUB_ENV"

      - name: Build for testing
        run: |
          set +e
          set -o pipefail
          xcodebuild \
            -project ios/CrediWise.xcodeproj \
            -scheme CrediWise \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing 2>&1 | tee /tmp/CrediWiseBuild.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            while IFS= read -r line; do
              echo "::error title=Xcode build::$line"
            done < <(grep -E 'error:|Testing failed:|Unable to find|Failed to' /tmp/CrediWiseBuild.log | tail -20)
          fi
          exit "$status"

      - name: Run tests
        run: |
          set +e
          set -o pipefail
          xcodebuild \
            -project ios/CrediWise.xcodeproj \
            -scheme CrediWise \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            -resultBundlePath /tmp/CrediWiseTests.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            test-without-building 2>&1 | tee /tmp/CrediWiseTests.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            while IFS= read -r line; do
              echo "::error title=Xcode tests::$line"
            done < <(grep -E 'error:|failed|Failing tests:|Test Case.*failed|Unable to find' /tmp/CrediWiseTests.log | tail -20)
          fi
          exit "$status"

      - name: Upload Xcode result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CrediWiseTests-${{ github.run_id }}
          path: /tmp/CrediWiseTests.xcresult
          if-no-files-found: ignore
